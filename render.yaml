# Render: set DATABASE_URL = Aiven "Service URI" (postgres://avnadmin:...@host:port/defaultdb?sslmode=require)
# or use Render Postgres fromDatabase. Do not commit secrets to git.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PG_SSL_MODE
        value: require
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
