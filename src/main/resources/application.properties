# Local: SPRING_DATASOURCE_* (docker-compose). Aiven / Render: set env DATABASE_URL = Service URI (postgres://...).
# CloudPostgresDatabaseEnvironmentPostProcessor maps DATABASE_URL -> jdbc before Hikari starts.
server.port=${PORT:8080}
# Render / reverse proxy: honor X-Forwarded-* so OAuth redirect_uri uses https and your domain (e.g. lddang.id.vn).
server.forward-headers-strategy=framework
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cameraProject}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver
# Aiven connection limit (e.g. 20): keep pool small. Override via HIKARI_MAXIMUM_POOL_SIZE if needed.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
# SSL: put sslmode on JDBC URL (Aiven Service URI already includes ?sslmode=require). Local URL has no sslmode.

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 (replace with your real values from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# --- Optional integration (Kafka / Redis / AMQP / batch): see pom.xml <profiles> ---
# Enable @Scheduled jobs: app.integration.scheduling-enabled=true
app.integration.scheduling-enabled=false
app.integration.messaging.publish-login-success=true
app.integration.kafka.enabled=false
app.integration.kafka.bootstrap-servers=
app.integration.redis.enabled=false
app.integration.amqp.enabled=false
app.integration.batch.job-runner-enabled=false
# Spring Batch (after adding profile batch + starter): spring.batch.job.enabled=false
spring.batch.job.enabled=false