spring.datasource.url=jdbc:postgresql://localhost:5432/cameraProject
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 (replace with your real values from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=REPLACE_WITH_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=REPLACE_WITH_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email